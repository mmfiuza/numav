# Defines the 'numav' service: builds from Dockerfile, mounts the repo root and
# SSH agent, passes host UID/GID, and keeps the container running with tty.

services:
  numav:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: numav
    privileged: true
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - ${SSH_AUTH_SOCK:-/tmp/no-ssh-agent}:/ssh-agent
      - ${HOME}/.gitconfig:/home/devuser/.gitconfig
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    env_file:
      - ../.devcontainer/.env
    tty: true
