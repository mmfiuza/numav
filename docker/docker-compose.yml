services:
  numav:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: numav
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.gitconfig:/home/devuser/.gitconfig 
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    env_file:
      - ../.devcontainer/.env
    tty: true
