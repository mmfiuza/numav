services:
  numav-solver:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: numav-solver
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ${SSH_AUTH_SOCK}:/ssh-agent
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    tty: true
