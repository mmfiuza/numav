services:
  numav:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: numav
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.gitconfig:/home/devuser/.gitconfig 
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - HOST_UID=${HOST_UID}
      - HOST_GID=${HOST_GID}
    tty: true
